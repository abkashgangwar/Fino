# ---------- SFTP ----------
# Defaults match the local test SFTP server in docker-compose.yml.
sftp.host=${SFTP_HOST:localhost}
sftp.port=${SFTP_PORT:2222}
sftp.username=${SFTP_USERNAME:testuser}
sftp.password=${SFTP_PASSWORD:testpass}
sftp.input-dir=${SFTP_INPUT_DIR:/upload/input}
sftp.output-dir=${SFTP_OUTPUT_DIR:/upload/output}

# ---------- PGP ----------
# The public key is NEVER bundled in the jar / committed to source.
# Provide it one of two ways at runtime:
#   1) PGP_PUBLIC_KEY_PATH     - path to a mounted key file (preferred: Secret/volume)
#   2) PGP_PUBLIC_KEY_CONTENT  - raw armored key text, injected directly as an env var
# If neither is set, the service fails fast on startup with a clear error.
pgp.public-key.path=${PGP_PUBLIC_KEY_PATH:}
pgp.public-key.content=${PGP_PUBLIC_KEY_CONTENT:}

# ---------- Polling ----------
# How often (cron) to check the input directory for new files.
# Default: every 10 seconds.
app.poll.cron=${APP_POLL_CRON:*/10 * * * * ?}

quarkus.scheduler.enabled=true
quarkus.log.level=INFO
quarkus.log.category."com.ember".level=DEBUG

quarkus.vertx.max-worker-execute-time=5M