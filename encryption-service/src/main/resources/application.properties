# ---------- SFTP: input server (files are picked up FROM here) ----------
# Hardcoded to match the "input" local test SFTP container in docker-compose.yml.
# NOTE: no longer read from env vars - edit these values directly.
sftp.input.host=localhost
sftp.input.port=2222
sftp.input.username=testuser
sftp.input.password=testpass
sftp.input.dir=/upload/input
# Number of pooled SFTP session/channel pairs against the input server. Keep
# >= app.processing.parallelism below so every concurrent worker can always
# get its own connection.
sftp.input.pool-size=8
# SFTP request-pipelining depth per channel (JSch default is 16; raised here for
# better large-file throughput over any link with real latency). Lower it if the
# input SFTP server pushes back on high concurrency.
sftp.input.bulk-requests=64

# ---------- SFTP: output server (encrypted output is written TO here) ----------
# This is a SEPARATE server from the input one above on purpose - the encrypted
# output commonly needs to land on a different host/vendor than the upstream
# input drop, with its own credentials. Hardcoded to match the "output" local
# test SFTP container in docker-compose.yml.
sftp.output.host=localhost
sftp.output.port=2223
sftp.output.username=testuser2
sftp.output.password=testpass2
sftp.output.dir=/upload/output
# Same tuning knobs as the input server above, sized independently for the output side.
sftp.output.pool-size=8
sftp.output.bulk-requests=64

# ---------- PGP ----------
# The public key is NEVER bundled in the jar / committed to source.
# path points at the mounted key file directly; content left blank.
# If both are empty, the service fails fast on startup with a clear error.
pgp.public-key.path=./secrets/public-key.asc
pgp.public-key.content=

# ---------- Polling ----------
# How often (cron) to check the input directory for new files.
# concurrentExecution = SKIP (set in code), so if one poll cycle over a large
# backlog takes longer than this interval, the next tick is safely skipped
# instead of starting an overlapping run - it fires again as soon as the
# current one finishes. Feel free to keep this short.
app.poll.cron=0 */10 * * * ?
# app.poll.cron=*/2 * * * * ?
# ---------- Processing ----------
# How many files are processed concurrently within a single poll cycle.
# Keep this <= sftp.input.pool-size and <= sftp.output.pool-size above.
app.processing.parallelism=8

# Pipeline strategy toggle - accepts true/false or yes/no.
#   false (default) -> file-based: download to a local temp file, zip to a temp file,
#                       PGP-encrypt to a temp file, then upload. Simple to reason about
#                       and debug; uses local disk as scratch space.
#   true             -> fully streamed: SFTP-in -> zip -> PGP -> SFTP-out, all in one
#                       chained pipe, nothing ever touches local disk. Needs one connection
#                       from each pool per in-flight file (see sftp.input.pool-size /
#                       sftp.output.pool-size above).
app.processing.streaming-enabled=false

quarkus.scheduler.enabled=true
quarkus.log.level=INFO
quarkus.log.category."com.ember".level=DEBUG

quarkus.http.port=8081

quarkus.vertx.max-worker-execute-time=10M

# ---------- Test profile ----------
# Quarkus activates everything under the "%test." prefix automatically whenever
# quarkus.profile=test is active - which happens two ways:
#   1) Automatically, for any @QuarkusTest / @QuarkusIntegrationTest run (mvn test).
#   2) Manually, by launching the packaged jar with -Dquarkus.profile=test (or the
#      QUARKUS_PROFILE=test env var) - this is how the Robot Framework functional
#      suite under src/test/robot/ starts the real service for its end-to-end run.
# Everything not overridden here still falls back to the base properties above -
# this block only lists what genuinely needs to differ for testing.
%test.sftp.input.host=localhost
%test.sftp.input.port=2222
%test.sftp.input.username=testuser
%test.sftp.input.password=testpass
%test.sftp.input.dir=/upload/input
# Smaller pools - the functional suite only ever has one or two files in flight.
%test.sftp.input.pool-size=2
%test.sftp.input.bulk-requests=16

%test.sftp.output.host=localhost
%test.sftp.output.port=2223
%test.sftp.output.username=testuser2
%test.sftp.output.password=testpass2
%test.sftp.output.dir=/upload/output
%test.sftp.output.pool-size=2
%test.sftp.output.bulk-requests=16

# Same local test key used for docker-compose dev; no secret material involved.
%test.pgp.public-key.path=./secrets/public-key.asc
%test.pgp.public-key.content=

# Poll every 2s instead of the base 10-minute cadence, so the Robot Framework
# suite gets a fast, predictable feedback loop instead of a multi-minute wait.
%test.app.poll.cron=*/2 * * * * ?
%test.app.processing.parallelism=2
%test.app.processing.streaming-enabled=false

# Verbose logging makes a failed functional run much easier to diagnose from
# the console output the Robot suite captures.
%test.quarkus.log.level=INFO
%test.quarkus.log.category."com.ember".level=DEBUG

# Avoid clashing with a dev instance that might already be running on 8081.
%test.quarkus.http.port=8084