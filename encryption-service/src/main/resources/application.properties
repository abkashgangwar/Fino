# ---------- SFTP ----------
# Hardcoded to match the local test SFTP server in docker-compose.yml.
# NOTE: no longer read from env vars - edit these values directly.

quarkus.http.port=8081


sftp.host=localhost
sftp.port=2222
sftp.username=testuser
sftp.password=testpass
sftp.input-dir=/upload/input
sftp.output-dir=/upload/output
# Number of pooled SFTP session/channel pairs. Keep >= app.processing.parallelism
# below so every concurrent worker can always get its own connection.
sftp.pool-size=8
# SFTP request-pipelining depth per channel (JSch default is 16; raised here for
# better large-file throughput over any link with real latency). Lower it if a
# particular SFTP server pushes back on high concurrency.
sftp.bulk-requests=64

# ---------- PGP ----------
# The public key is NEVER bundled in the jar / committed to source.
# path points at the mounted key file directly; content left blank.
# If both are empty, the service fails fast on startup with a clear error.
pgp.public-key.path=./secrets/public-key.asc
pgp.public-key.content=

# ---------- Polling ----------
# How often (cron) to check the input directory for new files.
# concurrentExecution = SKIP (set in code), so if one poll cycle over a large
# backlog takes longer than this interval, the next tick is safely skipped
# instead of starting an overlapping run - it fires again as soon as the
# current one finishes. Feel free to keep this short.
# app.poll.cron=*/10 * * * * ?

app.poll.cron=0 */10 * * * ?

# ---------- Processing ----------
# How many files are processed concurrently within a single poll cycle.
# Keep this <= sftp.pool-size above.
app.processing.parallelism=8

# Pipeline strategy toggle - accepts true/false or yes/no.
#   false (default) -> file-based: download to a local temp file, zip to a temp file,
#                       PGP-encrypt to a temp file, then upload. Simple to reason about
#                       and debug; uses local disk as scratch space.
#   true             -> fully streamed: SFTP-in -> zip -> PGP -> SFTP-out, all in one
#                       chained pipe, nothing ever touches local disk. Needs two SFTP
#                       connections per in-flight file (see sftp.pool-size above).
app.processing.streaming-enabled=false

quarkus.scheduler.enabled=true
quarkus.log.level=INFO
quarkus.log.category."com.ember".level=DEBUG

quarkus.vertx.max-worker-execute-time=10M