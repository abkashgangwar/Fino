version: "3.8"

services:
  # Local SFTP server. Login: testuser / testpass on port 2222.
  # Chroot root is /home/testuser, so paths as seen by the app are /upload/input
  # and /upload/output - matching the sftp.input-dir / sftp.output-dir defaults
  # in application.properties.
  sftp:
    image: atmoz/sftp:latest
    container_name: encryption-sftp
    ports:
      - "2222:22"
    volumes:
      - ./sftp-data/input:/home/testuser/upload/input
      - ./sftp-data/output:/home/testuser/upload/output
    command: testuser:testpass:1000:1000:upload
